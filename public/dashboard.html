<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasselni — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#0f1424;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--primary:#FF8C42;--accent:#FFB547;--success:#5EEAD4;--danger:#FB7185;--text:#FAFAF9;--muted:#7C7C8A}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:40px 32px;max-width:360px;width:100%;text-align:center}
.login-title{font-family:'Fraunces',serif;font-size:32px;font-weight:400;margin-bottom:6px}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
input{font-family:inherit;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--text);width:100%;outline:none;margin-bottom:12px}
input:focus{border-color:rgba(255,140,66,0.4)}
.login-btn{background:linear-gradient(135deg,#FF8C42,#FFB547);color:#0a0e1a;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;width:100%;cursor:pointer;font-family:inherit}
.login-err{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}
#dashboard{display:none}
.topbar{background:rgba(15,20,36,0.95);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.topbar-name{font-family:'Fraunces',serif;font-size:22px;font-weight:400}
.topbar-badge{background:rgba(94,234,212,0.15);border:1px solid rgba(94,234,212,0.2);color:var(--success);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:10px}
.btn-sm{background:var(--glass);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none}
.stats-row{display:flex;gap:12px;padding:16px 20px 0;overflow-x:auto}
.stat-card{flex-shrink:0;background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:14px 18px;min-width:130px}
.stat-val{font-family:'Fraunces',serif;font-size:30px;font-weight:400}
.stat-val.green{color:var(--success)}.stat-val.amber{color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-top:4px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:0;min-height:calc(100vh - 140px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
#dash-map{background:var(--bg);min-height:380px}
.side-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:18px;max-height:calc(100vh - 140px)}
.panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin:18px 0 10px}
.panel-title:first-child{margin-top:0}
.driver-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--glass);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.driver-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0a0e1a;flex-shrink:0}
.driver-info{flex:1;min-width:0}
.driver-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.driver-phone{font-size:11px;color:var(--muted)}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;flex-shrink:0}
.p-online{background:rgba(94,234,212,0.15);color:var(--success)}
.p-offline{background:rgba(255,255,255,0.05);color:var(--muted)}
.p-active{background:rgba(255,140,66,0.15);color:var(--primary)}
.ride-row{padding:10px 12px;background:var(--glass);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:12px}
.ride-head{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
.rstat{padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.s-completed{background:rgba(94,234,212,0.15);color:var(--success)}
.s-pending{background:rgba(255,140,66,0.15);color:var(--primary)}
.s-accepted{background:rgba(255,181,71,0.15);color:var(--accent)}
.s-cancelled,.s-expired,.s-rejected{background:rgba(251,113,133,0.15);color:var(--danger)}
.ride-meta{color:var(--muted);font-size:11px}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div style="font-size:48px;margin-bottom:12px">🛺</div>
    <div class="login-title">Dashboard</div>
    <div class="login-sub">Wasselni Fleet Management</div>
    <input id="pwd" type="password" placeholder="Admin password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <span class="topbar-name">Wasselni</span>
      <span class="topbar-badge" id="live-badge">● —</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--muted)" id="last-update">—</span>
      <button class="btn-sm" onclick="loadAll()">↻ Refresh</button>
      <button class="btn-sm" style="color:var(--danger);border-color:rgba(251,113,133,0.3)" onclick="resetData()">🗑 Reset Data</button>
      <a class="btn-sm" href="/map" target="_blank">🗺 Public Map</a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val green" id="s-online">—</div><div class="stat-label">Online Now</div></div>
    <div class="stat-card"><div class="stat-val amber" id="s-active">—</div><div class="stat-label">Active Rides</div></div>
    <div class="stat-card"><div class="stat-val" id="s-today">—</div><div class="stat-label">Today's Rides</div></div>
    <div class="stat-card"><div class="stat-val amber" id="s-earn">—</div><div class="stat-label">Today LBP</div></div>
    <div class="stat-card"><div class="stat-val" id="s-total">—</div><div class="stat-label">Total Rides</div></div>
  </div>

  <div class="layout">
    <div id="dash-map"><div class="empty" style="padding-top:160px">Map loads after sign-in…</div></div>
    <div class="side-panel">
      <div class="panel-title">Drivers (<span id="driver-count">0</span>)</div>
      <div id="driver-list"><div class="empty">—</div></div>
      <div class="panel-title">Recent Rides</div>
      <div id="ride-list"><div class="empty">—</div></div>
    </div>
  </div>
</div>

<script>
let adminPwd='',map=null,mapMarkers=[];
const DARK_STYLE=[
 {elementType:'geometry',stylers:[{color:'#0a0e1a'}]},
 {elementType:'labels.text.fill',stylers:[{color:'#7c7c8a'}]},
 {featureType:'road',elementType:'geometry',stylers:[{color:'#1a1f35'}]},
 {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2a2f4a'}]},
 {featureType:'water',elementType:'geometry',stylers:[{color:'#050a15'}]},
 {featureType:'poi',stylers:[{visibility:'off'}]},
 {featureType:'transit',stylers:[{visibility:'off'}]},
];
const TUKTUK_URL='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(
 `<svg viewBox="0 0 44 36" xmlns="http://www.w3.org/2000/svg"><path d="M8 27 a6 6 0 1 0 12 0 a6 6 0 1 0-12 0" fill="none" stroke="#FF8C42" stroke-width="2.5"/><circle cx="14" cy="27" r="2" fill="#FFB547"/><path d="M28 27 a6 6 0 1 0 12 0 a6 6 0 1 0-12 0" fill="none" stroke="#FF8C42" stroke-width="2.5"/><circle cx="34" cy="27" r="2" fill="#FFB547"/><path d="M14 21 L14 11 Q14 5 20 5 L30 5 L38 15 L38 21" fill="none" stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M17 5 Q25 -3 33 5" fill="none" stroke="#FFB547" stroke-width="2" stroke-linecap="round"/><line x1="14" y1="21" x2="38" y2="21" stroke="#FF8C42" stroke-width="2.5"/></svg>`);

document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const pwd=document.getElementById('pwd').value;
  let res;
  try{ res=await fetch('/api/dashboard/stats',{headers:{'x-admin-password':pwd}}); }
  catch{ document.getElementById('login-err').textContent='Network error'; return; }
  if(res.status===401){document.getElementById('login-err').textContent='Wrong password';return;}
  adminPwd=pwd;
  document.getElementById('login').style.display='none';
  document.getElementById('dashboard').style.display='block';
  await initMap();
  await loadAll();
  setInterval(loadAll,15000);
}

async function initMap(){
  try{
    const config=await fetch('/api/config').then(r=>r.json());
    if(!config.googleMapsKey)return;
    await new Promise((resolve,reject)=>{
      window._dashMapReady=resolve;
      const s=document.createElement('script');
      s.src=`https://maps.googleapis.com/maps/api/js?key=${config.googleMapsKey}&callback=_dashMapReady`;
      s.async=true;s.onerror=reject;document.head.appendChild(s);
    });
    document.querySelector('#dash-map .empty')?.remove();
    map=new google.maps.Map(document.getElementById('dash-map'),{
      center:{lat:33.89,lng:35.50},zoom:12,styles:DARK_STYLE,
      disableDefaultUI:true,gestureHandling:'greedy',
    });
  }catch(e){console.warn('map init failed',e);}
}

function authFetch(url){return fetch(url,{headers:{'x-admin-password':adminPwd}}).then(r=>r.json());}

async function resetData(){
  if(!confirm('Delete ALL ride history and driver records? This cannot be undone.'))return;
  await fetch('/api/dashboard/reset',{method:'POST',headers:{'x-admin-password':adminPwd}});
  await loadAll();
  alert('All data cleared.');
}
function timeAgo(ts){if(!ts)return'—';const m=Math.floor((Date.now()-new Date(ts).getTime())/60000);if(m<1)return'now';if(m<60)return m+'m';return Math.floor(m/60)+'h';}

async function loadAll(){
  try{
    const [stats,dd,rr]=await Promise.all([
      authFetch('/api/dashboard/stats'),
      authFetch('/api/dashboard/drivers'),
      authFetch('/api/dashboard/rides'),
    ]);

    document.getElementById('s-online').textContent=stats.onlineDrivers??'—';
    document.getElementById('s-active').textContent=stats.activeRides??'—';
    document.getElementById('s-today').textContent=stats.todayRides??'—';
    document.getElementById('s-earn').textContent=stats.todayEarningsLBP?`${(stats.todayEarningsLBP/1000).toFixed(0)}k`:'0';
    document.getElementById('s-total').textContent=stats.totalRides??'—';
    document.getElementById('live-badge').textContent=`● ${stats.onlineDrivers||0} online`;
    document.getElementById('last-update').textContent='Updated '+new Date().toLocaleTimeString();

    const drivers=dd.drivers||[];
    document.getElementById('driver-count').textContent=drivers.length;
    const dl=document.getElementById('driver-list');
    dl.innerHTML=drivers.length===0?'<div class="empty">No drivers yet</div>':
      drivers.sort((a,b)=>(b.online?1:0)-(a.online?1:0)).map(d=>{
        const cls=d.activeRide?'p-active':d.online?'p-online':'p-offline';
        const txt=d.activeRide?'On ride':d.online?'Online':'Offline';
        return `<div class="driver-row">
          <div class="driver-avatar">${(d.name||'D')[0].toUpperCase()}</div>
          <div class="driver-info">
            <div class="driver-name">${d.name||d.phone}</div>
            <div class="driver-phone">${d.phone} · GPS ${timeAgo(d.lastGPS)}</div>
          </div>
          <div class="pill ${cls}">${txt}</div>
        </div>`;
      }).join('');

    if(map){
      mapMarkers.forEach(m=>m.setMap(null));mapMarkers=[];
      const icon={url:TUKTUK_URL,scaledSize:new google.maps.Size(40,32),anchor:new google.maps.Point(20,32)};
      const onlineWithLoc=drivers.filter(d=>d.online&&d.location);
      onlineWithLoc.forEach(d=>{
        const m=new google.maps.Marker({position:d.location,map,icon,title:d.name});
        const iw=new google.maps.InfoWindow({content:`<div style="color:#111;font-family:Manrope,sans-serif"><b>${d.name}</b><br>${d.phone}<br>${d.activeRide?'🟠 On a ride':'🟢 Available'}</div>`});
        m.addListener('click',()=>iw.open(map,m));
        mapMarkers.push(m);
      });
      if(onlineWithLoc.length>1){
        const b=new google.maps.LatLngBounds();
        onlineWithLoc.forEach(d=>b.extend(d.location));
        map.fitBounds(b,60);
      }else if(onlineWithLoc.length===1){
        map.setCenter(onlineWithLoc[0].location);map.setZoom(14);
      }
    }

    const rides=rr.rides||[];
    const rl=document.getElementById('ride-list');
    rl.innerHTML=rides.length===0?'<div class="empty">No rides yet</div>':
      rides.slice(0,15).map(r=>{
        const st=r.status||'pending';
        const fare=r.fare_lbp?`${(r.fare_lbp/1000).toFixed(0)}k LBP · `:'';
        const type=(r.ride_type==='delivery')?'📦':'🧑';
        return `<div class="ride-row">
          <div class="ride-head">
            <span>${type} ${r.rider_name||'Rider'} → ${r.driver_name||'…'}</span>
            <span class="rstat s-${st}">${st}</span>
          </div>
          <div class="ride-meta">${fare}${timeAgo(r.created_at)}</div>
        </div>`;
      }).join('');
  }catch(e){console.error('loadAll failed',e);}
}
</script>
</body>
</html>
