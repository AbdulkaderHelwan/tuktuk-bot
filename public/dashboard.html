<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasselni — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#0f1424;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--primary:#FF8C42;--accent:#FFB547;--success:#5EEAD4;--danger:#FB7185;--text:#FAFAF9;--muted:#7C7C8A}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Login */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:40px 32px;max-width:360px;width:100%;text-align:center}
.login-title{font-family:'Fraunces',serif;font-size:32px;font-weight:400;letter-spacing:-0.03em;margin-bottom:6px}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:28px}
input{font-family:'Manrope',sans-serif;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--text);width:100%;outline:none;margin-bottom:12px}
input:focus{border-color:rgba(255,140,66,0.4)}
.login-btn{background:linear-gradient(135deg,#FF8C42,#FFB547);color:#0a0e1a;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;width:100%;cursor:pointer;font-family:'Manrope',sans-serif}
.login-err{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}

/* Dashboard */
#dashboard{display:none}
.topbar{background:rgba(15,20,36,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-name{font-family:'Fraunces',serif;font-size:22px;font-weight:400;letter-spacing:-0.03em}
.topbar-badge{background:rgba(94,234,212,0.15);border:1px solid rgba(94,234,212,0.2);color:var(--success);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.btn-sm{background:var(--glass);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif}
.btn-sm:hover{border-color:rgba(255,255,255,0.2)}
.last-update{font-size:12px;color:var(--muted)}

.layout{display:grid;grid-template-columns:1fr 380px;grid-template-rows:auto 1fr;height:calc(100vh - 65px)}
@media(max-width:900px){.layout{grid-template-columns:1fr;grid-template-rows:auto auto 1fr}}

/* Stats row */
.stats-row{grid-column:1/-1;display:flex;gap:12px;padding:20px 24px 0;overflow-x:auto}
.stat-card{flex-shrink:0;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:16px 20px;min-width:140px}
.stat-val{font-family:'Fraunces',serif;font-size:32px;font-weight:400;letter-spacing:-0.04em}
.stat-val.green{color:var(--success)}
.stat-val.amber{color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-top:4px}

/* Map area */
#dash-map{background:var(--bg);width:100%;height:100%;min-height:400px}

/* Side panel */
.side-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:20px}
.panel-section{margin-bottom:24px}
.panel-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px}

/* Driver list */
.driver-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--glass);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.driver-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0a0e1a;flex-shrink:0}
.driver-info{flex:1;min-width:0}
.driver-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.driver-phone{font-size:11px;color:var(--muted)}
.status-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.status-online{background:rgba(94,234,212,0.15);color:var(--success)}
.status-offline{background:rgba(255,255,255,0.05);color:var(--muted)}
.status-active{background:rgba(255,140,66,0.15);color:var(--primary)}

/* Ride list */
.ride-row{padding:10px 12px;background:var(--glass);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;font-size:12px}
.ride-row-header{display:flex;justify-content:space-between;margin-bottom:4px}
.ride-status{padding:2px 6px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase}
.s-completed{background:rgba(94,234,212,0.15);color:var(--success)}
.s-pending{background:rgba(255,140,66,0.15);color:var(--primary)}
.s-accepted{background:rgba(255,181,71,0.15);color:var(--accent)}
.s-cancelled{background:rgba(251,113,133,0.15);color:var(--danger)}
.ride-meta{color:var(--muted);font-size:11px}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div style="font-size:48px;margin-bottom:12px">🛺</div>
    <div class="login-title">Dashboard</div>
    <div class="login-sub">Wasselni Fleet Management</div>
    <input id="pwd" type="password" placeholder="Admin password" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-name">Wasselni</div>
      <div class="topbar-badge" id="live-badge">● Loading</div>
    </div>
    <div class="topbar-actions">
      <div class="last-update" id="last-update">--</div>
      <button class="btn-sm" onclick="loadAll()">↻ Refresh</button>
      <a href="/map" class="btn-sm" target="_blank">🗺 Public Map</a>
    </div>
  </div>

  <div class="layout">
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val green" id="s-online">--</div><div class="stat-label">Online Now</div></div>
      <div class="stat-card"><div class="stat-val amber" id="s-active">--</div><div class="stat-label">Active Rides</div></div>
      <div class="stat-card"><div class="stat-val" id="s-today">--</div><div class="stat-label">Today's Rides</div></div>
      <div class="stat-card"><div class="stat-val amber" id="s-earnings">--</div><div class="stat-label">Today's Earnings</div></div>
      <div class="stat-card"><div class="stat-val" id="s-total">--</div><div class="stat-label">Total Rides</div></div>
    </div>

    <div id="dash-map"></div>

    <div class="side-panel">
      <div class="panel-section">
        <div class="panel-title">Drivers (<span id="driver-count">0</span>)</div>
        <div id="driver-list"><div class="empty">Loading...</div></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">Recent Rides</div>
        <div id="ride-list"><div class="empty">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
let adminPwd = '', map, driverMarkers = [];

const DARK_STYLE = [
  {elementType:'geometry',stylers:[{color:'#0a0e1a'}]},
  {elementType:'labels.text.fill',stylers:[{color:'#7c7c8a'}]},
  {featureType:'road',elementType:'geometry',stylers:[{color:'#1a1f35'}]},
  {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#2a2f4a'}]},
  {featureType:'water',elementType:'geometry',stylers:[{color:'#050a15'}]},
  {featureType:'poi',stylers:[{visibility:'off'}]},
  {featureType:'transit',stylers:[{visibility:'off'}]},
];

const TUKTUK_URL = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
  `<svg viewBox="0 0 44 36" xmlns="http://www.w3.org/2000/svg">
    <path d="M8 27 a6 6 0 1 0 12 0 a6 6 0 1 0-12 0" fill="none" stroke="#FF8C42" stroke-width="2.5"/>
    <circle cx="14" cy="27" r="2" fill="#FFB547"/>
    <path d="M28 27 a6 6 0 1 0 12 0 a6 6 0 1 0-12 0" fill="none" stroke="#FF8C42" stroke-width="2.5"/>
    <circle cx="34" cy="27" r="2" fill="#FFB547"/>
    <path d="M14 21 L14 11 Q14 5 20 5 L30 5 L38 15 L38 21" fill="none" stroke="#FF8C42" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M17 5 Q25 -3 33 5" fill="none" stroke="#FFB547" stroke-width="2" stroke-linecap="round"/>
    <line x1="14" y1="21" x2="38" y2="21" stroke="#FF8C42" stroke-width="2.5"/>
  </svg>`
);

document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function doLogin() {
  const pwd = document.getElementById('pwd').value;
  const res = await fetch('/api/dashboard/stats?password=' + encodeURIComponent(pwd));
  if (res.status === 401) { document.getElementById('login-err').textContent = 'Wrong password'; return; }
  adminPwd = pwd;
  document.getElementById('login').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  await initMap();
  await loadAll();
  setInterval(loadAll, 15000);
}

async function initMap() {
  const config = await fetch('/api/config').then(r => r.json()).catch(() => ({}));
  if (!config.googleMapsKey) return;
  await new Promise(resolve => {
    window._mapReady = resolve;
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${config.googleMapsKey}&callback=_mapReady`;
    s.async = true; document.head.appendChild(s);
  });
  map = new google.maps.Map(document.getElementById('dash-map'), {
    center: { lat: 33.89, lng: 35.50 }, zoom: 12,
    styles: DARK_STYLE, disableDefaultUI: true, gestureHandling: 'greedy',
  });
}

async function authFetch(url) {
  return fetch(url, { headers: { 'x-admin-password': adminPwd } }).then(r => r.json());
}

function timeAgo(ts) {
  if (!ts) return 'never';
  const mins = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins/60)}h ago`;
}

async function loadAll() {
  const [stats, driversData, ridesData] = await Promise.all([
    authFetch('/api/dashboard/stats'),
    authFetch('/api/dashboard/drivers'),
    authFetch('/api/dashboard/rides'),
  ]);

  // Stats
  document.getElementById('s-online').textContent = stats.onlineDrivers ?? '--';
  document.getElementById('s-active').textContent = stats.activeRides ?? '--';
  document.getElementById('s-today').textContent = stats.todayRides ?? '--';
  document.getElementById('s-earnings').textContent = stats.todayEarningsLBP ? `${(stats.todayEarningsLBP/1000).toFixed(0)}k` : '0';
  document.getElementById('s-total').textContent = stats.totalRides ?? '--';
  document.getElementById('live-badge').textContent = `● ${stats.onlineDrivers || 0} online`;
  document.getElementById('last-update').textContent = 'Updated ' + new Date().toLocaleTimeString();

  // Driver list
  const drivers = driversData.drivers || [];
  document.getElementById('driver-count').textContent = drivers.length;
  const driverListEl = document.getElementById('driver-list');
  if (drivers.length === 0) { driverListEl.innerHTML = '<div class="empty">No drivers registered yet</div>'; }
  else {
    driverListEl.innerHTML = drivers.sort((a,b) => b.online - a.online).map(d => {
      const initial = (d.name||'D')[0].toUpperCase();
      const statusClass = d.activeRide ? 'status-active' : d.online ? 'status-online' : 'status-offline';
      const statusText = d.activeRide ? 'On ride' : d.online ? 'Online' : 'Offline';
      const gpsAge = d.lastGPS ? timeAgo(d.lastGPS) : 'No GPS';
      return `<div class="driver-row">
        <div class="driver-avatar">${initial}</div>
        <div class="driver-info">
          <div class="driver-name">${d.name}</div>
          <div class="driver-phone">${d.phone} · GPS: ${gpsAge}</div>
        </div>
        <div class="status-pill ${statusClass}">${statusText}</div>
      </div>`;
    }).join('');
  }

  // Map markers for drivers
  if (map) {
    driverMarkers.forEach(m => m.setMap(null));
    driverMarkers = [];
    const icon = { url: TUKTUK_URL, scaledSize: new google.maps.Size(40,32), anchor: new google.maps.Point(20,32) };
    drivers.filter(d => d.online && d.location).forEach(d => {
      const m = new google.maps.Marker({
        position: { lat: d.location.lat, lng: d.location.lng },
        map, icon, title: d.name,
      });
      const info = new google.maps.InfoWindow({
        content: `<div style="background:#0f1424;color:#fff;padding:10px;border-radius:8px;font-family:Manrope,sans-serif">
          <b>${d.name}</b><br><span style="color:#7C7C8A;font-size:12px">${d.phone}</span><br>
          <span style="color:${d.activeRide ? '#FF8C42' : '#5EEAD4'};font-size:11px">${d.activeRide ? '🟠 On a ride' : '🟢 Available'}</span>
        </div>`,
      });
      m.addListener('click', () => info.open(map, m));
      driverMarkers.push(m);
    });
  }

  // Recent rides
  const rides = ridesData.rides || [];
  const rideListEl = document.getElementById('ride-list');
  if (rides.length === 0) { rideListEl.innerHTML = '<div class="empty">No rides yet</div>'; }
  else {
    rideListEl.innerHTML = rides.slice(0, 15).map(r => {
      const statusCls = { completed:'s-completed', pending:'s-pending', accepted:'s-accepted', cancelled:'s-cancelled', expired:'s-cancelled' }[r.status] || 's-pending';
      const fare = r.fare_lbp || r.fareEstimateLBP ? `${((r.fare_lbp||r.fareEstimateLBP)/1000).toFixed(0)}k LBP` : '';
      const type = (r.ride_type||r.rideType) === 'delivery' ? '📦' : '🧑';
      return `<div class="ride-row">
        <div class="ride-row-header">
          <span>${type} ${r.rider_name||r.riderName||'Rider'} → ${r.driver_name||r.driverName||'...'}</span>
          <span class="ride-status ${statusCls}">${r.status}</span>
        </div>
        <div class="ride-meta">${fare} · ${timeAgo(r.created_at||r.createdAt)}</div>
      </div>`;
    }).join('');
  }
}
</script>
</body>
</html>
